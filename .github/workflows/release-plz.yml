name: release-plz

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-plz:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0
        with:
          command: release-pr
